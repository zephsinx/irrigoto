  # Cumulative water usage (all zones combined). state_class:
  # total_increasing lets HA's long-term statistics engine bucket
  # this into hourly samples that survive the recorder purge window
  # (10 days for state history → 10 years for stats). The dashboard
  # uses Statistics Graph card's stat_types: change to render this
  # as "water delivered per day/hour" bars.
  - trigger:
      - trigger: event
        event_type: esphome.<<DEV_DASH>>_watering_complete
    sensor:
      - name: <<DEV_DASH>> cumulative volume
        unique_id: <<DEV_USC>>_cumulative_volume_v2
        default_entity_id: sensor.<<DEV_USC>>_cumulative_volume
        unit_of_measurement: "L"
        device_class: water
        state_class: total_increasing
        icon: mdi:water-pump
