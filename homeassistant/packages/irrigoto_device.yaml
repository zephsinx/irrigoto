    sensor:
      - name: <<DEV_DASH>> zone 1 cumulative volume
        unique_id: <<DEV_USC>>_zone_1_cumulative_volume_v2
        default_entity_id: sensor.<<DEV_USC>>_zone_1_cumulative_volume
        unit_of_measurement: "L"
        device_class: water
        state_class: total_increasing
        icon: mdi:sprinkler-variant
        state: >-
          {{ ((states('sensor.<<DEV_USC>>_zone_1_cumulative_volume') | float(0)) +
              (trigger.event.data.volume_l | float(0))) | round(2) }}
      # Cumulative depth applied (cm). The device already computes
      # per-event average depth and emits it as actual_avg_depth_mm
      # in the watering_complete event (= volume_l / zone_area_m2);
      # we just divide by 10 to get cm and accumulate. Stats:
      # total_increasing so stat_types: change gives "depth applied
      # per period" for the Trends chart.
      #
      # (Older revisions of this template did the volume/area math
      # in Jinja from the raw zone_area_m2 field, but that returned 0
      # consistently -- using the device's prepared field is both
      # simpler and works.)
      - name: <<DEV_DASH>> zone 1 cumulative depth
        unique_id: <<DEV_USC>>_zone_1_cumulative_depth_v2
