      - name: <<DEV_DASH>> zone 1 last polygon coverage
        unique_id: <<DEV_USC>>_zone_1_last_polygon_coverage_v2
        default_entity_id: sensor.<<DEV_USC>>_zone_1_last_polygon_coverage
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:vector-intersection
        state: "{{ trigger.event.data.polygon_coverage_pct | float(0) }}"
      - name: <<DEV_DASH>> zone 1 last status
        unique_id: <<DEV_USC>>_zone_1_last_status_v2
        default_entity_id: sensor.<<DEV_USC>>_zone_1_last_status
        icon: mdi:flag-checkered
        state: "{{ trigger.event.data.status }}"

  - trigger:
      - trigger: event
        event_type: esphome.<<DEV_DASH>>_watering_complete
        event_data: {zone: "2"}
    sensor:
      - name: <<DEV_DASH>> zone 2 last finished
        unique_id: <<DEV_USC>>_zone_2_last_finished_v2
        default_entity_id: sensor.<<DEV_USC>>_zone_2_last_finished
