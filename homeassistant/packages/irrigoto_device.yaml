# irrigoto — per-device Home Assistant package (TEMPLATE)
#
# This is the PER-DEVICE half of the irrigoto HA config. It is templated:
# tools/ha-regen.py reads homeassistant/devices.yaml and emits one
# personalized copy per device (generated/packages/irrigoto_device_<slug_usc>.yaml),
# with the placeholders below substituted. Drop every generated copy plus
# the shared files (irrigoto_common.yaml, irrigoto_schedule.yaml) into your
# HA config/packages/ directory.
#
#   homeassistant:
#     packages: !include_dir_named packages
#
# >>>STRIP-ON-REGEN-START<<<
# ─── NAMING CONVENTION (read once, then forget) ──────────────────────
#
# Every entity, automation, script, and helper this template DEFINES is
# prefixed with the device's underscore-slug (<<DEV_USC>>) so that N
# copies — one per device — coexist in one HA without colliding. The
# rule is deliberately simple:
#
#   <<DEV_USC>>_<name>   →  defined HERE, belongs to ONE device
#                           (e.g. sensor.irrigoto_xxxxxx_cumulative_volume)
#   irrigoto_<name>      →  SHARED across the fleet, defined in
#                           irrigoto_common.yaml / irrigoto_schedule.yaml
#                           (e.g. sensor.irrigoto_desired_schedule)
#
# Three placeholders are substituted per device by ha-regen:
#
#   <<DEV_DASH>>  →  irrigoto-xxxxxx   dash form; ESPHome events
#                                      (esphome.<<DEV_DASH>>_watering_complete)
#   <<DEV_USC>>   →  irrigoto_xxxxxx   underscore form; device entity IDs
#                                      (sensor.<<DEV_USC>>_irrigoto_pressure)
#                                      and every entity defined here
#   <<DEV_URL>>   →  http://<ip>       base URL for HTTP-poll sensors
#
# Device-PROVIDED entities (published by the ESPHome integration) read
# as <domain>.<<DEV_USC>>_irrigoto_<entity> — the trailing "irrigoto_"
# is the friendly_name slug and is NOT one of our prefixes; leave it.
# ─────────────────────────────────────────────────────────────────────
# >>>STRIP-ON-REGEN-END<<<

# ── Input helpers ────────────────────────────────────────────────────
# Mirror of the device's live schedule text — updated from the
# schedule_changed event below so HA dashboards can display it without
# polling the device. Read-only from the UI's perspective; treat as a
# status snapshot.
input_text:
  <<DEV_USC>>_schedule_mirror:
    name: <<DEV_DASH>> schedule (live)
    icon: mdi:calendar-text
    max: 255
  # b355: per-device "last schedule_version HA observed from this device."
  # Updated whenever the schedule_version text_sensor publishes or the
  # schedule_changed event fires; the reconciler compares HA's last_seen
  # against the device's current value to decide whether to pull in
  # device-side edits. Stored as a string so we can use input_text
  # (input_number has step / precision quirks for a monotonic counter).
  <<DEV_USC>>_last_seen_schedule_version:
    name: "irrigoto <<DEV_DASH>> last seen schedule_version"
    icon: mdi:counter
    max: 16
    initial: "0"
  # Durable cache of this device's zone-picker options ("<name> (#<id>)" JSON),
  # refreshed whenever the device is awake. input_text values are restored
  # across HA restarts, whereas input_select.set_options is NOT -- so this is
  # what lets the zone pickers (overview + schedule compose) still show a
  # device's zones while it's asleep, even right after a restart.
  <<DEV_USC>>_zone_cache:
    name: "irrigoto <<DEV_DASH>> zone cache"
    icon: mdi:playlist-check
    max: 255
    initial: "[]"
  # Per-device schedule slots. Each device owns its OWN sequential slots 1..8
  # (replacing the old 10 globally-shared input_text.irrigoto_sched_N slots,
  # which collided across devices and left entries with no slot number). Value
  # format is a flat CSV: id,lm,zone,mode,depth,hour,minute,days_mask,enabled
  # (empty string = unused). The device is implied by which input_text holds it,
  # so there is no "dev|" prefix anymore.
  <<DEV_USC>>_sched_1: {name: "<<DEV_DASH>> sched slot 1", max: 96, initial: ""}
  <<DEV_USC>>_sched_2: {name: "<<DEV_DASH>> sched slot 2", max: 96, initial: ""}
  <<DEV_USC>>_sched_3: {name: "<<DEV_DASH>> sched slot 3", max: 96, initial: ""}
  <<DEV_USC>>_sched_4: {name: "<<DEV_DASH>> sched slot 4", max: 96, initial: ""}
  <<DEV_USC>>_sched_5: {name: "<<DEV_DASH>> sched slot 5", max: 96, initial: ""}
  <<DEV_USC>>_sched_6: {name: "<<DEV_DASH>> sched slot 6", max: 96, initial: ""}
  <<DEV_USC>>_sched_7: {name: "<<DEV_DASH>> sched slot 7", max: 96, initial: ""}
  <<DEV_USC>>_sched_8: {name: "<<DEV_DASH>> sched slot 8", max: 96, initial: ""}

# b311: chase-mode duration shared across all zones. 1..10 minutes,
# 1-minute steps. The chase scripts read this and pass it to the
# firmware via shell_command.irrigoto_chase_zone.
input_number:
  <<DEV_USC>>_chase_duration:
    name: <<DEV_DASH>> chase duration
    icon: mdi:timer-outline
    min: 1
    max: 10
    step: 1
    unit_of_measurement: min
    mode: slider
  # Which zone id the "Restore zone" button reimports from its backup file.
  <<DEV_USC>>_restore_zone_id:
    name: <<DEV_DASH>> restore zone id
    icon: mdi:backup-restore
    min: 0
    max: 15
    step: 1
    mode: slider

# Depth selector for the Device tab's "Start watering" button. Pairs with
# the device's Zone + Water Mode selects; the water_now script maps the
# (mode, depth) pair to the firmware's mode digit. Smooth mode ignores depth
# (device only supports Smooth 1/8").
input_select:
  # Zone picker for the "Start watering" button. Options are populated from
  # the device's live zone list as "Name (#id)" by the
  # <<DEV_USC>>_update_water_zone_options automation (includes zone id 0).
  # HA-side so the selection holds (the device's own Zone/Mode selects
  # republish their state each loop tick and snap back).
  <<DEV_USC>>_water_zone:
    name: <<DEV_DASH>> water zone
    icon: mdi:sprinkler-variant
    options:
      - "(loading)"
  <<DEV_USC>>_water_mode:
    name: <<DEV_DASH>> water mode
    icon: mdi:water-pump
    options:
      - Pulse
      - Gentle
      - Smooth
    initial: Pulse
  <<DEV_USC>>_water_depth:
    name: <<DEV_DASH>> water depth
    icon: mdi:arrow-expand-down
    options:
      - 1/8 in
      - 1/4 in
      - 3/8 in
      - 1/2 in
      - 5/8 in
      - 3/4 in
      - 7/8 in
      - 1 in
    initial: 1/8 in

# b311: per-zone chase scripts. Each calls the chase shell_command with
# its zone id and the current input_number value. Card buttons fire
# script.<<DEV_USC>>_chase_zone_N -- no need for the card to know about ip
# resolution or duration plumbing.
script:
  <<DEV_USC>>_chase_zone_0:
    alias: "irrigoto <<DEV_DASH>>: chase Zone (id 0)"
    icon: mdi:dog
    mode: single
    sequence:
      - action: shell_command.irrigoto_chase_zone
        data:
          ip: "{{ states('sensor.<<DEV_USC>>_irrigoto_ip_address') }}"
          zone_id: 0
          duration: "{{ states('input_number.<<DEV_USC>>_chase_duration') | int(3) }}"
  <<DEV_USC>>_chase_zone_1:
    alias: "irrigoto <<DEV_DASH>>: chase Zone (id 1)"
    icon: mdi:dog
    mode: single
    sequence:
      - action: shell_command.irrigoto_chase_zone
        data:
          ip: "{{ states('sensor.<<DEV_USC>>_irrigoto_ip_address') }}"
          zone_id: 1
          duration: "{{ states('input_number.<<DEV_USC>>_chase_duration') | int(3) }}"
  <<DEV_USC>>_chase_zone_2:
    alias: "irrigoto <<DEV_DASH>>: chase Zone (id 2)"
    icon: mdi:dog
    mode: single
    sequence:
      - action: shell_command.irrigoto_chase_zone
        data:
          ip: "{{ states('sensor.<<DEV_USC>>_irrigoto_ip_address') }}"
          zone_id: 2
          duration: "{{ states('input_number.<<DEV_USC>>_chase_duration') | int(3) }}"
  <<DEV_USC>>_chase_zone_3:
    alias: "irrigoto <<DEV_DASH>>: chase Zone (id 3)"
    icon: mdi:dog
    mode: single
    sequence:
      - action: shell_command.irrigoto_chase_zone
        data:
          ip: "{{ states('sensor.<<DEV_USC>>_irrigoto_ip_address') }}"
          zone_id: 3
          duration: "{{ states('input_number.<<DEV_USC>>_chase_duration') | int(3) }}"
  <<DEV_USC>>_chase_zone_4:
    alias: "irrigoto <<DEV_DASH>>: chase Zone (id 4)"
    icon: mdi:dog
    mode: single
    sequence:
      - action: shell_command.irrigoto_chase_zone
        data:
          ip: "{{ states('sensor.<<DEV_USC>>_irrigoto_ip_address') }}"
          zone_id: 4
          duration: "{{ states('input_number.<<DEV_USC>>_chase_duration') | int(3) }}"
  <<DEV_USC>>_chase_zone_5:
    alias: "irrigoto <<DEV_DASH>>: chase Zone (id 5)"
    icon: mdi:dog
    mode: single
    sequence:
      - action: shell_command.irrigoto_chase_zone
        data:
          ip: "{{ states('sensor.<<DEV_USC>>_irrigoto_ip_address') }}"
          zone_id: 5
          duration: "{{ states('input_number.<<DEV_USC>>_chase_duration') | int(3) }}"
  <<DEV_USC>>_chase_zone_6:
    alias: "irrigoto <<DEV_DASH>>: chase Zone (id 6)"
    icon: mdi:dog
    mode: single
    sequence:
      - action: shell_command.irrigoto_chase_zone
        data:
          ip: "{{ states('sensor.<<DEV_USC>>_irrigoto_ip_address') }}"
          zone_id: 6
          duration: "{{ states('input_number.<<DEV_USC>>_chase_duration') | int(3) }}"
  <<DEV_USC>>_chase_zone_7:
    alias: "irrigoto <<DEV_DASH>>: chase Zone (id 7)"
    icon: mdi:dog
    mode: single
    sequence:
      - action: shell_command.irrigoto_chase_zone
        data:
          ip: "{{ states('sensor.<<DEV_USC>>_irrigoto_ip_address') }}"
          zone_id: 7
          duration: "{{ states('input_number.<<DEV_USC>>_chase_duration') | int(3) }}"
  <<DEV_USC>>_water_cancel:
    alias: "irrigoto <<DEV_DASH>>: cancel watering"
    icon: mdi:stop-circle
    mode: single
    sequence:
      - action: shell_command.irrigoto_water_cancel
        data:
          ip: "{{ states('sensor.<<DEV_USC>>_irrigoto_ip_address') }}"

  # Start watering the zone/mode/depth chosen in the HA selectors ("Start
  # watering" button). The zone selector carries the id as "Name (#id)", so
  # the id (including 0) resolves unambiguously; mode maps to the firmware
  # style digit, depth to eighths of an inch:
  #   Pulse=1  Gentle=5  Smooth=7      depth 1..8 = 1/8".. 1"
  <<DEV_USC>>_water_now:
    alias: "irrigoto <<DEV_DASH>>: start watering selected zone/mode/depth"
    icon: mdi:play-circle
    mode: single
    sequence:
      - variables:
          zone_sel: "{{ states('input_select.<<DEV_USC>>_water_zone') }}"
          mode_sel: "{{ states('input_select.<<DEV_USC>>_water_mode') }}"
          depth_sel: "{{ states('input_select.<<DEV_USC>>_water_depth') }}"
          zone_id: >-
            {%- if '(#' in zone_sel and ')' in zone_sel -%}
              {{ zone_sel.split('(#')[1].split(')')[0] | int(-1) }}
            {%- else -%}-1{%- endif -%}
          depth8: >-
            {{ {'1/8 in':1,'1/4 in':2,'3/8 in':3,'1/2 in':4,
                '5/8 in':5,'3/4 in':6,'7/8 in':7,'1 in':8}.get(depth_sel, 1) }}
          mode_digit: >-
            {%- if mode_sel == 'Pulse' -%}1
            {%- elif mode_sel == 'Gentle' -%}5
            {%- else -%}7
            {%- endif -%}
      - if:
          - condition: template
            value_template: "{{ (zone_id | int(-1)) >= 0 }}"
        then:
          - action: shell_command.irrigoto_water_zone
            data:
              ip: "{{ states('sensor.<<DEV_USC>>_irrigoto_ip_address') }}"
              zone_id: "{{ zone_id }}"
              mode: "{{ mode_digit }}"
              depth: "{{ depth8 }}"
          - action: logbook.log
            data:
              name: irrigoto
              message: >-
                <<DEV_DASH>>: start watering {{ zone_sel }}
                — {{ mode_sel }} {{ depth_sel }} (mode {{ mode_digit }})
              domain: sensor
              entity_id: sensor.<<DEV_USC>>_watering_log
        else:
          - action: logbook.log
            data:
              name: irrigoto
              message: >-
                <<DEV_DASH>>: start watering aborted — couldn't resolve a zone id
                from "{{ zone_sel }}" (pick a zone once the list has loaded)
              domain: sensor
              entity_id: sensor.<<DEV_USC>>_watering_log

  # b355: Force-push the HA-side desired schedule for THIS device immediately
  # using the new sync_schedule service. Builds a sync payload that
  # includes id + last_modified per HA-slot entry plus tombstones for
  # any device-known IDs that are no longer represented in HA slots.
  # Entries the device has that HA never knew about (id not in our
  # last-seen set) are left alone -- web-UI adds survive.
  <<DEV_USC>>_push_schedule:
    alias: "irrigoto <<DEV_DASH>>: push desired schedule now"
    icon: mdi:upload
    mode: single
    sequence:
      - variables:
          rendered_sync: >-
            {{ state_attr('sensor.<<DEV_USC>>_desired_rendered', 'sync_payload')
               | default('', true) }}
          rendered_count: >-
            {{ state_attr('sensor.<<DEV_USC>>_desired_rendered', 'sync_count')
               | default(0) | int(0) }}
      - if:
          - condition: template
            value_template: "{{ rendered_count > 0 }}"
        then:
          - action: esphome.<<DEV_USC>>_sync_schedule
            data:
              entries: "{{ rendered_sync }}"
          - action: logbook.log
            data:
              name: irrigoto
              message: >-
                <<DEV_DASH>>: sync_schedule pushed
                ({{ rendered_count }} entries / tombstones)
              domain: sensor
              entity_id: sensor.<<DEV_USC>>_watering_log

  # Phase 1: zone backup/restore over the b399 by-id endpoints. Backup
  # snapshots every zone to /config/irrigoto_backups/<<DEV_DASH>>/; restore
  # reimports the zone id selected by input_number.<<DEV_USC>>_restore_zone_id.
  <<DEV_USC>>_backup_zones:
    alias: "irrigoto <<DEV_DASH>>: backup all zones"
    icon: mdi:content-save-all
    mode: single
    sequence:
      - action: shell_command.irrigoto_backup_zones
        data:
          ip: "{{ states('sensor.<<DEV_USC>>_irrigoto_ip_address') }}"
          slug: "<<DEV_DASH>>"
  <<DEV_USC>>_restore_zone:
    alias: "irrigoto <<DEV_DASH>>: restore selected zone"
    icon: mdi:backup-restore
    mode: single
    sequence:
      - action: shell_command.irrigoto_restore_zone
        data:
          ip: "{{ states('sensor.<<DEV_USC>>_irrigoto_ip_address') }}"
          slug: "<<DEV_DASH>>"
          zone_id: "{{ states('input_number.<<DEV_USC>>_restore_zone_id') | int(0) }}"

# Logbook scoping — suppress state-change entries for the placeholder
# "log" sensors below. We use them only as hooks to tag logbook.log
# entries from the watering/cal automations against a dedicated entity,
# so the dashboard's logbook card filtered to that entity shows only
# those summary lines and nothing else (no "Auto-sleep turned on", no
# "became available", etc).
#
# Two scopes for watering:
#   - <<DEV_USC>>_watering_log: catch-all activity tag for sync_schedule
#     pushes, CSV mirrors, reconciler pulls, push-blocked warnings, etc.
#     The Device tab's "Recent activity" card filters to this.
#   - <<DEV_USC>>_watering_completions: ONLY per-watering completion lines
#     (one entry per finished cycle). The Trends tab's "Watering history"
#     card filters to this so it stays free of sync/mirror chatter.
logbook:
  exclude:
    entities:
      - sensor.<<DEV_USC>>_watering_log
      - sensor.<<DEV_USC>>_watering_completions
      - sensor.<<DEV_USC>>_calibration_log

# ── Valve open/close toggle ──────────────────────────────────────────
# Single switch backing the dashboard valve toggle. turn_on/turn_off POST
# to the device's /valve/open and /valve/close HTTP endpoints (moved off
# the HA service bus in b370 to keep ListEntitiesServices under the
# 2026.4.5 send-buffer ceiling). The displayed state is NOT optimistic —
# it follows the b370 valve_open binary_sensor, which the device publishes
# from its confirmed encoder angle. So the toggle only flips once the
# device reports the valve actually moved.
# (The valve toggle is defined as a MODERN template switch — the first
# entry under the `template:` list below. The legacy `switch: platform:
# template` form is removed in HA 2026.6.)

# ── Template sensors ─────────────────────────────────────────────────
# Trigger-based template sensors are evaluated only when the matching
# event fires, then retain their value until the next event. Recorder
# picks them up the same as any other sensor.
#
# The first three below are PLAIN (non-trigger) sensors with a constant
# state. They exist purely as targets for logbook.log entries from the
# <<DEV_USC>>_log_watering_completion / _cal_completion / system-activity
# automations. Combined with the logbook: exclude block above, this
# gives us a logbook view that contains ONLY the per-event summary lines.
template:
  # Valve open/close toggle (modern template switch). default_entity_id
  # pins the entity_id so it never collides into a "_2" suffix. State
  # follows the device's confirmed valve_open binary_sensor (not optimistic).
  - switch:
      - name: "<<DEV_DASH>> valve"
        unique_id: <<DEV_USC>>_valve
        default_entity_id: switch.<<DEV_USC>>_valve
        icon: mdi:valve
        state: >-
          {{ is_state('binary_sensor.<<DEV_USC>>_irrigoto_valve_open', 'on') }}
        turn_on:
          - action: shell_command.irrigoto_valve_open
            data:
              ip: "{{ states('sensor.<<DEV_USC>>_irrigoto_ip_address') }}"
        turn_off:
          - action: shell_command.irrigoto_valve_close
            data:
              ip: "{{ states('sensor.<<DEV_USC>>_irrigoto_ip_address') }}"
  # Per-zone existence flags driving chase/heatmap/overview card visibility
  # (conditional cards only allow state conditions, not templates). TRIGGER-
  # based with a guard condition so they update ONLY when the device's live
  # zone list is actually available — when schedule_rest goes unavailable
  # (device asleep) the trigger fires but the condition fails, so the sensors
  # RETAIN their last value instead of flipping off (which would make every
  # heatmap/chase card vanish on each sleep). Trigger-based template entities
  # also restore their last state across HA restarts.
  - trigger:
      - trigger: state
        entity_id: sensor.<<DEV_USC>>_schedule_rest
        attribute: zones
      - trigger: homeassistant
        event: start
    condition:
      - condition: template
        value_template: >-
          {{ state_attr('sensor.<<DEV_USC>>_schedule_rest', 'zones')
             | default([], true) | count > 0 }}
    binary_sensor:
      - name: "<<DEV_DASH>> zone 1 exists"
        unique_id: <<DEV_USC>>_zone_1_exists
        default_entity_id: binary_sensor.<<DEV_USC>>_zone_1_exists
        state: "{{ 0 in (state_attr('sensor.<<DEV_USC>>_schedule_rest', 'zones') | map(attribute='id') | map('int') | list) }}"
      - name: "<<DEV_DASH>> zone 2 exists"
        unique_id: <<DEV_USC>>_zone_2_exists
        default_entity_id: binary_sensor.<<DEV_USC>>_zone_2_exists
        state: "{{ 1 in (state_attr('sensor.<<DEV_USC>>_schedule_rest', 'zones') | map(attribute='id') | map('int') | list) }}"
      - name: "<<DEV_DASH>> zone 3 exists"
        unique_id: <<DEV_USC>>_zone_3_exists
        default_entity_id: binary_sensor.<<DEV_USC>>_zone_3_exists
        state: "{{ 2 in (state_attr('sensor.<<DEV_USC>>_schedule_rest', 'zones') | map(attribute='id') | map('int') | list) }}"
      - name: "<<DEV_DASH>> zone 4 exists"
        unique_id: <<DEV_USC>>_zone_4_exists
        default_entity_id: binary_sensor.<<DEV_USC>>_zone_4_exists
        state: "{{ 3 in (state_attr('sensor.<<DEV_USC>>_schedule_rest', 'zones') | map(attribute='id') | map('int') | list) }}"
      - name: "<<DEV_DASH>> zone 5 exists"
        unique_id: <<DEV_USC>>_zone_5_exists
        default_entity_id: binary_sensor.<<DEV_USC>>_zone_5_exists
        state: "{{ 4 in (state_attr('sensor.<<DEV_USC>>_schedule_rest', 'zones') | map(attribute='id') | map('int') | list) }}"
      - name: "<<DEV_DASH>> zone 6 exists"
        unique_id: <<DEV_USC>>_zone_6_exists
        default_entity_id: binary_sensor.<<DEV_USC>>_zone_6_exists
        state: "{{ 5 in (state_attr('sensor.<<DEV_USC>>_schedule_rest', 'zones') | map(attribute='id') | map('int') | list) }}"
      - name: "<<DEV_DASH>> zone 7 exists"
        unique_id: <<DEV_USC>>_zone_7_exists
        default_entity_id: binary_sensor.<<DEV_USC>>_zone_7_exists
        state: "{{ 6 in (state_attr('sensor.<<DEV_USC>>_schedule_rest', 'zones') | map(attribute='id') | map('int') | list) }}"
      - name: "<<DEV_DASH>> zone 8 exists"
        unique_id: <<DEV_USC>>_zone_8_exists
        default_entity_id: binary_sensor.<<DEV_USC>>_zone_8_exists
        state: "{{ 7 in (state_attr('sensor.<<DEV_USC>>_schedule_rest', 'zones') | map(attribute='id') | map('int') | list) }}"
  - sensor:
      - name: <<DEV_DASH>> watering log
        unique_id: <<DEV_USC>>_watering_log_v2
        default_entity_id: sensor.<<DEV_USC>>_watering_log
        icon: mdi:water-percent
        state: active
      - name: <<DEV_DASH>> watering completions
        unique_id: <<DEV_USC>>_watering_completions_v2
        default_entity_id: sensor.<<DEV_USC>>_watering_completions
        icon: mdi:sprinkler-variant
        state: active
      - name: <<DEV_DASH>> calibration log
        unique_id: <<DEV_USC>>_calibration_log_v2
        default_entity_id: sensor.<<DEV_USC>>_calibration_log
        icon: mdi:tune
        state: active
  - trigger:
      - trigger: event
        event_type: esphome.<<DEV_DASH>>_watering_complete
    sensor:
      - name: <<DEV_DASH>> last watering zone
        unique_id: <<DEV_USC>>_last_watering_zone_v2
        default_entity_id: sensor.<<DEV_USC>>_last_watering_zone
        state: "{{ trigger.event.data.zone_name }}"
        icon: mdi:sprinkler-variant

      - name: <<DEV_DASH>> last watering volume
        unique_id: <<DEV_USC>>_last_watering_volume_v2
        default_entity_id: sensor.<<DEV_USC>>_last_watering_volume
        unit_of_measurement: "L"
        # No device_class: water -- HA requires total / total_increasing
        # for that device class, but this sensor is a per-event point-in-
        # time value, not a cumulative meter. The cumulative-volume
        # sensors below DO declare device_class: water + total_increasing.
        state_class: measurement
        state: "{{ trigger.event.data.volume_l | float(0) }}"

      - name: <<DEV_DASH>> last watering duration
        unique_id: <<DEV_USC>>_last_watering_duration_v2
        default_entity_id: sensor.<<DEV_USC>>_last_watering_duration
        unit_of_measurement: "min"
        state_class: measurement
        icon: mdi:timer-outline
        state: >-
          {{ ((trigger.event.data.duration_s | float(0)) / 60.0) | round(1) }}

      - name: <<DEV_DASH>> last watering area
        unique_id: <<DEV_USC>>_last_watering_area_v2
        default_entity_id: sensor.<<DEV_USC>>_last_watering_area
        unit_of_measurement: "m²"
        state_class: measurement
        icon: mdi:texture-box
        state: "{{ trigger.event.data.area_m2 | float(0) }}"

      - name: <<DEV_DASH>> last watering score
        unique_id: <<DEV_USC>>_last_watering_score_v2
        default_entity_id: sensor.<<DEV_USC>>_last_watering_score
        unit_of_measurement: "/5"
        state_class: measurement
        icon: mdi:star-outline
        state: "{{ trigger.event.data.score | float(0) }}"

      - name: <<DEV_DASH>> last watering status
