              (d_mm / 10)) | round(3) }}

  # Score also lives in its own trigger group so it gets a clean
  # per-event update with measurement state_class. The score sensor
  # already exists above for "last watering score"; this one is the
  # SAME data but exposed with a separate unique_id so HA tracks it
  # in long-term statistics. Statistics Graph with stat_types: mean,
  # period: day renders a daily-average bar chart.
  - trigger:
      - trigger: event
        event_type: esphome.<<DEV_DASH>>_watering_complete
    sensor:
      - name: <<DEV_DASH>> watering score
        unique_id: <<DEV_USC>>_watering_score_v2
        default_entity_id: sensor.<<DEV_USC>>_watering_score
        unit_of_measurement: "/5"
        state_class: measurement
        icon: mdi:star-outline
        state: "{{ trigger.event.data.score | float(0) }}"

      # Polygon coverage (b277+): the *honest* "what fraction of the zone
      # got water" answer. Firmware rasterizes the polygon and counts only
      # cells INSIDE the polygon that received spray; over-spray past the
      # edges is excluded. Bounded 0..100 by construction. Pair with
      # spray_spread (below) to read both "how much of the zone got water"
      # AND "how much water landed outside the zone" in one glance.
      - name: <<DEV_DASH>> last watering polygon coverage
        unique_id: <<DEV_USC>>_last_watering_polygon_coverage_v2
        default_entity_id: sensor.<<DEV_USC>>_last_watering_polygon_coverage
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:vector-intersection
        state: "{{ trigger.event.data.polygon_coverage_pct | float(0) }}"

      # Legacy coverage ratio: area_m2 / zone_area_m2 capped at 100%. Kept
      # for back-compat with anything that already references it, but the
      # polygon_coverage sensor above is the better signal — it doesn't
      # over-credit over-spray. Will be retired once dashboards migrate.
      - name: <<DEV_DASH>> last watering coverage ratio
        unique_id: <<DEV_USC>>_last_watering_coverage_ratio_v2
        default_entity_id: sensor.<<DEV_USC>>_last_watering_coverage_ratio
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:vector-square
        state: >-
          {% set a = trigger.event.data.area_m2 | float(0) %}
          {% set z = trigger.event.data.zone_area_m2 | float(0) %}
          {{ [a / z * 100, 100] | min | round(1) if z > 0 else 0 }}

      # Spray spread: same numerator/denominator but UNCAPPED. Tells
      # you how far the spray pattern extends beyond the polygon. 100%
      # = spray exactly matches polygon; 200% = sprayed area is twice
      # the polygon (heavy over-spray); useful for diagnosing nozzle
      # alignment and mode selection (smooth tends to land close to
      # 100%, pulse/gentle commonly exceeds 150%).
      - name: <<DEV_DASH>> last watering spray spread
        unique_id: <<DEV_USC>>_last_watering_spray_spread_v2
        default_entity_id: sensor.<<DEV_USC>>_last_watering_spray_spread
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:scatter-plot
        state: >-
          {% set a = trigger.event.data.area_m2 | float(0) %}
          {% set z = trigger.event.data.zone_area_m2 | float(0) %}
          {{ (a / z * 100) | round(1) if z > 0 else 0 }}

      # ── Supply-pressure diagnostics (b281/b282) ──────────────────────
      # Back-computed pre-valve (pump-side) supply pressure during the
      # last run. Firmware uses the global pressure-cal table's f(valve_deg)
      # to invert each ring's measured nozzle PSI into the supply PSI that
      # would have produced it. On a well-pump system these numbers reveal
      # the cycle dynamics: a wide max-min spread means the pump cut in/out
      # multiple times during the run; a low avg means watering draw
      # exceeded pump output and the cell was running thirsty.
      #
      # All three are 0.0 if the zone perimeter has insufficient cal data
      # to back-compute (e.g., very small zones, single-throw zones).
      - name: <<DEV_DASH>> last watering supply psi min
        unique_id: <<DEV_USC>>_last_watering_supply_psi_min_v2
        default_entity_id: sensor.<<DEV_USC>>_last_watering_supply_psi_min
        unit_of_measurement: "psi"
        state_class: measurement
        icon: mdi:arrow-down-bold-outline
        state: "{{ trigger.event.data.supply_psi_min | float(0) }}"

      - name: <<DEV_DASH>> last watering supply psi max
        unique_id: <<DEV_USC>>_last_watering_supply_psi_max_v2
        default_entity_id: sensor.<<DEV_USC>>_last_watering_supply_psi_max
        unit_of_measurement: "psi"
        state_class: measurement
        icon: mdi:arrow-up-bold-outline
        state: "{{ trigger.event.data.supply_psi_max | float(0) }}"

      - name: <<DEV_DASH>> last watering supply psi avg
        unique_id: <<DEV_USC>>_last_watering_supply_psi_avg_v2
        default_entity_id: sensor.<<DEV_USC>>_last_watering_supply_psi_avg
        unit_of_measurement: "psi"
        state_class: measurement
        icon: mdi:gauge
        state: "{{ trigger.event.data.supply_psi_avg | float(0) }}"

      # Count of rings where the throw fell more than 10% short of target
      # AND the back-computed supply pressure during that ring was more
      # than 10% below the cal-time supply reference. These are the rings
      # that under-delivered specifically because the pump couldn't keep
      # up -- candidates for a future automatic cleanup pass (b288+) that
      # re-waters them once supply has recovered. A consistently non-zero
      # value across many runs means the zone is genuinely supply-limited
      # and the current cal/zone configuration is asking for more throw
      # than the pump can sustain.
      - name: <<DEV_DASH>> last watering rings supply limited
        unique_id: <<DEV_USC>>_last_watering_rings_supply_limited_v2
        default_entity_id: sensor.<<DEV_USC>>_last_watering_rings_supply_limited
        unit_of_measurement: "rings"
        state_class: measurement
        icon: mdi:water-alert-outline
        state: "{{ trigger.event.data.rings_supply_limited | int(0) }}"

  # ── Per-zone last-run details ──────────────────────────────────────
  # For each zone 1..8 we capture the most recent watering's details
  # in a tight group of sensors. The Trends-tab "Last by zone" panel
  # uses conditional cards keyed off last_finished != unknown to
  # auto-hide zones you don't have configured.
  #
