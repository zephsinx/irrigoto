          {{ ((states('sensor.<<DEV_USC>>_cumulative_volume') | float(0)) +
              (trigger.event.data.volume_l | float(0))) | round(2) }}

  # Per-zone cumulative volume — filtered version of the above. Each
  # template group accepts only events with its own zone number, so a
  # given watering only updates ONE of the per-zone sensors. Stats
  # engine then lets us render a multi-zone bar chart (Statistics
  # Graph, stat_types: change, period: day).
